services:
  app-python:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - PORT=5000
      - VISITS_FILE=/data/visits
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
