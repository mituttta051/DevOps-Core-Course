{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "devops-info-service.fullname" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "devops-info-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "devops-info-service.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
            {{- include "devops-info-service.envVars" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "devops-info-service.fullname" . }}-secret
            - configMapRef:
                name: {{ include "devops-info-service.fullname" . }}-env
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: /data
            {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "devops-info-service.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-info-service.fullname" . }}-data
        {{- end }}
  strategy:
    {{- if eq .Values.rollout.strategy "canary" }}
    canary:
      steps:
        {{- range .Values.rollout.canary.steps }}
        {{- if and (hasKey . "analysis") (kindIs "string" .analysis) }}
        - analysis:
            templates:
              - templateName: {{ include "devops-info-service.fullname" $ }}-health
        {{- else }}
        - {{ toYaml . | indent 10 | trim }}
        {{- end }}
        {{- end }}
    {{- else if eq .Values.rollout.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "devops-info-service.fullname" . }}
      previewService: {{ include "devops-info-service.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
      {{- with .Values.rollout.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ . }}
      {{- end }}
      scaleDownDelaySeconds: {{ .Values.rollout.blueGreen.scaleDownDelaySeconds }}
    {{- end }}
{{- end }}
