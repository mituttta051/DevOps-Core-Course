{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-info-service.fullname" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devops-info-service.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy | default "OrderedReady" }}
  updateStrategy:
    {{- if eq .Values.statefulset.updateStrategy.type "RollingUpdate" }}
    type: RollingUpdate
    rollingUpdate:
      partition: {{ .Values.statefulset.updateStrategy.rollingUpdate.partition | default 0 }}
    {{- else }}
    type: {{ .Values.statefulset.updateStrategy.type }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "devops-info-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "devops-info-service.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
            {{- include "devops-info-service.envVars" . | nindent 12 }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VISITS_FILE
              value: {{ .Values.statefulset.visitsFile | default "/data/visits" | quote }}
          envFrom:
            - secretRef:
                name: {{ include "devops-info-service.fullname" . }}-secret
            - configMapRef:
                name: {{ include "devops-info-service.fullname" . }}-env
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "devops-info-service.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "devops-info-service.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.statefulset.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.statefulset.persistence.size }}
        {{- with .Values.statefulset.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
{{- end }}
