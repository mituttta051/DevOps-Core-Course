apiVersion: v1
kind: Service
metadata:
  name: dependency-service
  labels:
    app: dependency-service
spec:
  selector:
    app: dependency-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: wait-for-service-demo
  labels:
    app: wait-for-service-demo
spec:
  initContainers:
    - name: wait-for-dependency
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Waiting for service dependency-service to resolve..."
          until nslookup dependency-service.default.svc.cluster.local; do
            echo "Service not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Service dependency-service is now resolvable. Starting main container."
  containers:
    - name: main-app
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dependency-app
  labels:
    app: dependency-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dependency-app
  template:
    metadata:
      labels:
        app: dependency-app
    spec:
      containers:
        - name: dependency-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
