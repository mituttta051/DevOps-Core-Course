---
- name: Install Docker
  block:
    - name: Remove conflicting packages
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

    - name: Install python3-docker
      apt:
        name: python3-docker
        state: present

  rescue:
    - name: Wait before retry
      pause:
        seconds: 10
        prompt: "Retrying after GPG key failure"

    - name: Retry apt update
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Retry Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry Docker repository and install
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Retry Docker packages install
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

  always:
    - name: Ensure Docker service is enabled and started
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install
    - docker

- name: Configure Docker
  block:
    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_config
    - docker
