---
- name: Deploy All Applications
  hosts: webservers
  become: true

  tasks:
    - name: Deploy Python App
      include_role:
        name: web_app
      vars:
        app_name: devops-python
        docker_image: mituta/devops-info-service-python
        docker_tag: latest
        app_port: 8000
        app_internal_port: 5000
        compose_project_dir: "/opt/devops-python"
        app_env:
          HOST: "0.0.0.0"
          PORT: "5000"

    - name: Deploy Go App
      include_role:
        name: web_app
      vars:
        app_name: devops-go
        docker_image: mituta/devops-info-service-go
        docker_tag: latest
        app_port: 8001
        app_internal_port: 5000
        compose_project_dir: "/opt/devops-go"
        app_env:
          HOST: "0.0.0.0"
          PORT: "5000"
