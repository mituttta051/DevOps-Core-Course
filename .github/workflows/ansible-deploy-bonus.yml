name: Ansible Deployment — Bonus (Go)

on:
  push:
    branches: [main, master]
    paths:
      - 'ansible/vars/app_bonus.yml'
      - 'ansible/playbooks/deploy_bonus.yml'
      - 'ansible/roles/web_app/**'
      - '.github/workflows/ansible-deploy-bonus.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/vars/app_bonus.yml'
      - 'ansible/playbooks/deploy_bonus.yml'
      - 'ansible/roles/web_app/**'
      - '.github/workflows/ansible-deploy-bonus.yml'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/deploy_bonus.yml

  deploy:
    name: Deploy Go Application
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker community.general

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Go Application with Ansible
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          cd ansible
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass
          ansible-playbook playbooks/deploy_bonus.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_pass
          rm -f /tmp/vault_pass

      - name: Verify Go App Deployment
        run: |
          sleep 10
          curl -f --connect-timeout 5 "http://${{ secrets.VM_HOST }}:8001" || true
          curl -f --connect-timeout 5 "http://${{ secrets.VM_HOST }}:8001/health" || exit 1
